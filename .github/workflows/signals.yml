name: Trading Signal Engine

on:
  schedule:
    - cron: "0 * * * *"      # hourly fallback (cron-job.org triggers every 5 min)
  workflow_dispatch:          # manual trigger for testing

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-signals:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run signal engine
        working-directory: prop_firm_signals
        env:
          EMAIL_SENDER:       ${{ secrets.EMAIL_SENDER }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_RECIPIENT:    ${{ secrets.EMAIL_RECIPIENT }}
        run: python signal_engine.py --once

      - name: Commit signal history
        run: |
          git config user.name "Signal Bot"
          git config user.email "bot@prop-signals.com"
          git add prop_firm_signals/signal_history.json
          git diff --staged --quiet || git commit -m "update signal history [skip ci]"
          git push
