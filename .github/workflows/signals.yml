name: Trading Signal Engine

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes, 24/7
  workflow_dispatch:           # manual trigger from GitHub UI

jobs:
  run-signals:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run signal engine
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          CLICKUP_API_KEY: ${{ secrets.CLICKUP_API_KEY }}
          CLICKUP_LIST_ID: ${{ secrets.CLICKUP_LIST_ID }}
        run: python signal_engine.py

      - name: Commit signal history and dashboard
        run: |
          git config user.name "Signal Bot"
          git config user.email "bot@prop-signals.com"
          git add signal_history.json dashboard.html
          git diff --staged --quiet || git commit -m "update signals & dashboard [skip ci]"
          git push
